name: Daily Automation
on:
  schedule:
    - cron: '30 21 * * *'  
  workflow_dispatch:
jobs:
  automate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install playwright pandas openpyxl lxml requests && playwright install chromium
      - name: Run automation
        env:
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EBUILDER_USERNAME: ${{ secrets.EBUILDER_USERNAME }}
          EBUILDER_PASSWORD: ${{ secrets.EBUILDER_PASSWORD }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_REFRESH_TOKEN: ${{ secrets.AZURE_REFRESH_TOKEN }}
          OTP_EMAIL: ${{ secrets.OTP_EMAIL }}
        run: python automate.py
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: screenshot_*.png
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report
          path: report_*.xlsx
      - name: Upload raw html
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: raw_html
          path: report_raw.html

